<app-wrapper>
  <app-section-header
    page-main
    [sectionLabel]="'pages.experiences.sectionLabel' | translate"
    [title]="'pages.experiences.title' | translate"
    [description]="'pages.experiences.description' | translate"
  ></app-section-header>

  <section page-content class="experiences-section">
    @if (isLoading()) {
      <app-info-state
        mode="loading"
        [message]="'pages.experiences.timeline.loading' | translate"
      />
    } @else if (hasError()) {
      <app-info-state
        mode="error"
        [message]="'pages.experiences.timeline.error' | translate"
      />
    } @else if (timelineItems().length === 0) {
      <app-info-state
        mode="empty"
        [message]="'pages.experiences.timeline.empty' | translate"
      />
    } @else {
      <div class="experiences-timeline">
        @for (item of timelineItems(); track item.id) {
          <app-experience-timeline-card
            [item]="item"
            [isActive]="isSelectedExperience(item.id)"
            [isLast]="$last"
            (openDetails)="openExperienceDetails($event)"
            (openCustomer)="openCustomerDetails($event)"
            (openTechnology)="openTechnologyDetails($event)"
          />
        }
      </div>
    }
  </section>

  <app-experience-detail-modal
    [isOpen]="isDetailOpen()"
    [item]="selectedExperience()"
    (closed)="closeExperienceDetails()"
  />

  <app-technology-modal
    [isOpen]="isTechnologyModalOpen()"
    [technology]="selectedTechnology()"
    (closed)="closeTechnologyDetails()"
  />

  <app-tag-modal
    [isOpen]="isCustomerDetailOpen()"
    [title]="selectedCustomer()?.name ?? ''"
    [subtitle]="selectedCustomer()?.companyName ?? ''"
    [image]="selectedCustomer()?.image ?? null"
    [details]="selectedCustomerDetails()"
    (closed)="closeCustomerDetails()"
  />
</app-wrapper>
