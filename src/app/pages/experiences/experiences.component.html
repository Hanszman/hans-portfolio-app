<app-wrapper>
  <section page-main class="experiences-hero">
    <span class="experiences-eyebrow">
      {{ 'pages.experiences.sectionLabel' | translate }}
    </span>
    <h1 class="experiences-title">{{ 'pages.experiences.title' | translate }}</h1>
    <p class="experiences-description">
      {{ 'pages.experiences.description' | translate }}
    </p>
  </section>

  <section page-content class="experiences-section">
    @if (isLoading()) {
      <app-info-state
        mode="loading"
        [message]="'pages.experiences.timeline.loading' | translate"
      />
    } @else if (hasError()) {
      <app-info-state
        mode="error"
        [message]="'pages.experiences.timeline.error' | translate"
      />
    } @else if (timelineItems().length === 0) {
      <app-info-state
        mode="empty"
        [message]="'pages.experiences.timeline.empty' | translate"
      />
    } @else {
      <div class="experiences-timeline">
        @for (item of timelineItems(); track item.id) {
          <app-experience-timeline-card
            [item]="item"
            [isActive]="isSelectedExperience(item.id)"
            (openDetails)="openExperienceDetails($event)"
          />
        }
      </div>
    }
  </section>

  <app-experience-detail-modal
    [isOpen]="isDetailOpen()"
    [item]="selectedExperience()"
    (closed)="closeExperienceDetails()"
  />
</app-wrapper>
