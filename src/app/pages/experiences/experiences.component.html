<app-page-wrapper>
  <div page-main>
    <app-page-intro
      [sectionLabel]="'pages.experiences.sectionLabel' | translate"
      [title]="'pages.experiences.title' | translate"
      [description]="'pages.experiences.description' | translate"
    />
  </div>

  <app-surface
    page-sidebar
    tone="secondary"
    [label]="'pages.experiences.roadmap.label' | translate"
    [surfaceTitle]="'pages.experiences.roadmap.title' | translate"
    [description]="'pages.experiences.roadmap.description' | translate"
  />

  <app-surface
    page-content
    tone="success"
    [label]="'pages.experiences.status.label' | translate"
    [surfaceTitle]="'pages.experiences.status.title' | translate"
    [description]="'pages.experiences.status.description' | translate"
  />

  <app-surface
    page-content
    tone="base"
    [label]="'pages.experiences.layout.label' | translate"
    [surfaceTitle]="'pages.experiences.layout.title' | translate"
    [description]="'pages.experiences.layout.description' | translate"
  />
</app-page-wrapper>
