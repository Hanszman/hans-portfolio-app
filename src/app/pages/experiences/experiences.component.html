<app-page-wrapper>
  <div page-main>
    <app-page-intro
      [sectionLabel]="i18n.t('pages.experiences.sectionLabel')"
      [title]="i18n.t('pages.experiences.title')"
      [description]="i18n.t('pages.experiences.description')"
    />
  </div>

  <app-surface
    page-sidebar
    tone="secondary"
    [label]="i18n.t('pages.experiences.roadmap.label')"
    [surfaceTitle]="i18n.t('pages.experiences.roadmap.title')"
    [description]="i18n.t('pages.experiences.roadmap.description')"
  />

  <app-surface
    page-content
    tone="success"
    [label]="i18n.t('pages.experiences.status.label')"
    [surfaceTitle]="i18n.t('pages.experiences.status.title')"
    [description]="i18n.t('pages.experiences.status.description')"
  />

  <app-surface
    page-content
    tone="base"
    [label]="i18n.t('pages.experiences.layout.label')"
    [surfaceTitle]="i18n.t('pages.experiences.layout.title')"
    [description]="i18n.t('pages.experiences.layout.description')"
  />
</app-page-wrapper>
