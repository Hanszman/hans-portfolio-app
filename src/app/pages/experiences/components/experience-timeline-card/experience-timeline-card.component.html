<app-timeline-card [isActive]="isActive()" [isLast]="isLast()">
    <header class="experience-card-header">
      <img
        class="experience-card-logo"
        [src]="item().companyImage.src"
        [alt]="item().companyImage.alt"
        loading="lazy"
      />

      <div class="experience-card-heading">
        <h2 class="experience-card-company">{{ item().companyName }}</h2>
        <p class="experience-card-role">{{ item().roleTitle }}</p>
      </div>

      <span class="experience-card-date">
        <hans-icon name="LuCalendarDays" iconSize="small"></hans-icon>
        {{ item().dateRangeLabel }}
      </span>
    </header>

    <p class="experience-card-summary">{{ item().description }}</p>

    <div class="experience-card-customers">
      <hans-icon name="LuUsers" iconSize="small"></hans-icon>

      <div class="experience-card-chip-list">
        @for (customer of item().customers; track customer.slug) {
          <button
            type="button"
            class="experience-card-tag-button"
            (click)="requestCustomerDetails(customer)"
          >
            <hans-tag
              [attr.label]="customer.name"
              [attr.image-src]="customer.image.src"
              [attr.image-alt]="customer.image.alt"
              mediaPosition="left"
              tagColor="base"
              tagSize="sm"
            ></hans-tag>
          </button>
        }
      </div>
    </div>

    <div class="experience-card-stack">
      @for (technology of visibleTechnologies(); track technology.slug) {
        <button
          type="button"
          class="experience-card-tag-button"
          (click)="requestTechnologyDetails(technology)"
        >
          <hans-tag
            [attr.label]="technology.name"
            [attr.image-src]="technology.image.src"
            [attr.image-alt]="technology.image.alt"
            mediaPosition="left"
            tagColor="info"
            tagSize="sm"
          ></hans-tag>
        </button>
      }

      <app-expandable-list-toggle
        [isExpanded]="isTechnologyListExpanded()"
        [hiddenCount]="hiddenTechnologyCount()"
        expandLabelKey="pages.experiences.timeline.moreTechnologies"
        collapseLabelKey="common.actions.showLess"
        (toggled)="toggleTechnologyList()"
      />
    </div>

    <button
      type="button"
      class="experience-card-action"
      (click)="requestDetails()"
    >
      {{ 'common.actions.viewDetails' | translate }}
      <hans-icon name="LuArrowRight" iconSize="small"></hans-icon>
    </button>
</app-timeline-card>
