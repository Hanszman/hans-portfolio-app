<section class="home-hero">
  <div class="home-hero-copy">
    <span class="home-hero-availability">
      <span class="home-hero-availability-dot"></span>
      {{ hero().availabilityKey | translate }}
    </span>

    <h1 class="app-display-hero-title home-hero-title">
      <span>{{ hero().greetingKey | translate }}</span>
      <strong>{{ hero().name }}</strong>
    </h1>

    <p class="home-hero-subtitle">{{ hero().subtitleKey | translate }}</p>

    <p class="home-hero-description">{{ hero().descriptionKey | translate }}</p>

    <div class="home-hero-actions">
      <hans-button
        [routerLink]="hero().primaryActionRoute"
        [attr.label]="hero().primaryActionLabelKey | translate"
        buttonColor="primary"
        buttonShape="rounded"
        buttonSize="large"
      ></hans-button>

      <hans-button
        [routerLink]="hero().secondaryActionRoute"
        [attr.label]="hero().secondaryActionLabelKey | translate"
        buttonColor="base"
        buttonShape="rounded"
        buttonSize="large"
        buttonVariant="outline"
      ></hans-button>
    </div>

    <app-portfolio-social-links
      class="home-hero-social"
      [ariaLabelKey]="'pages.home.hero.social.navigation'"
      [links]="hero().socialLinks"
      [locationKey]="hero().locationKey"
    />
  </div>

  <div class="home-hero-visual">
    <div class="home-hero-image-frame">
      <hans-avatar
        [src]="hero().imageSrc"
        [alt]="hero().name"
        avatarSize="large"
      ></hans-avatar>
    </div>
  </div>
</section>
