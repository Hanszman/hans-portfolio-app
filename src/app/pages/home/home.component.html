<app-page-wrapper>
  <app-home-hero-section page-main [hero]="hero" />

  <div page-content class="home-page-body">
    @if (isLoading()) {
      <div class="home-page-state">
        <app-portfolio-state
          mode="loading"
          [message]="'pages.home.loading' | translate"
        />
      </div>
    } @else if (hasError()) {
      <div class="home-page-state">
        <app-portfolio-state
          mode="error"
          [message]="'pages.home.error' | translate"
        />
      </div>
    } @else {
      <app-home-metrics-strip
        [ariaLabelKey]="'pages.home.metrics.ariaLabel'"
        [metrics]="heroMetrics()"
      />

      @if (topTechnologyChips().length > 0) {
        <app-home-stack-chips
          [labelKey]="'pages.home.stack.label'"
          [titleKey]="'pages.home.stack.title'"
          [descriptionKey]="'pages.home.stack.description'"
          [chips]="topTechnologyChips()"
        />
      } @else {
        <div class="home-page-state">
          <app-portfolio-state
            mode="empty"
            [message]="'pages.home.stack.empty' | translate"
          />
        </div>
      }
    }

    <app-home-navigation-cards [cards]="navigationCards" />
  </div>
</app-page-wrapper>
