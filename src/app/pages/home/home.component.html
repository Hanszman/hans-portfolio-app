<app-page-wrapper>
  <div page-main>
    <app-page-intro
      [sectionLabel]="i18n.t('pages.home.sectionLabel')"
      [title]="i18n.t('pages.home.title')"
      [description]="i18n.t('pages.home.description')"
    />
  </div>

  <app-surface
    page-sidebar
    tone="primary"
    [label]="i18n.t('pages.home.roadmap.label')"
    [surfaceTitle]="i18n.t('pages.home.roadmap.title')"
    [description]="i18n.t('pages.home.roadmap.description')"
  />

  <app-surface
    page-content
    tone="success"
    [label]="i18n.t('pages.home.status.label')"
    [surfaceTitle]="i18n.t('pages.home.status.title')"
    [description]="i18n.t('pages.home.status.description')"
  />

  <app-surface
    page-content
    tone="base"
    [label]="i18n.t('pages.home.layout.label')"
    [surfaceTitle]="i18n.t('pages.home.layout.title')"
    [description]="i18n.t('pages.home.layout.description')"
  />
</app-page-wrapper>
