<app-page-wrapper>
  <div page-main>
    <app-page-intro
      [sectionLabel]="'pages.home.sectionLabel' | translate"
      [title]="'pages.home.title' | translate"
      [description]="'pages.home.description' | translate"
    />
  </div>

  <app-surface
    page-sidebar
    tone="primary"
    [label]="'pages.home.roadmap.label' | translate"
    [surfaceTitle]="'pages.home.roadmap.title' | translate"
    [description]="'pages.home.roadmap.description' | translate"
  />

  <app-surface
    page-content
    tone="success"
    [label]="'pages.home.status.label' | translate"
    [surfaceTitle]="'pages.home.status.title' | translate"
    [description]="'pages.home.status.description' | translate"
  />

  <app-surface
    page-content
    tone="base"
    [label]="'pages.home.layout.label' | translate"
    [surfaceTitle]="'pages.home.layout.title' | translate"
    [description]="'pages.home.layout.description' | translate"
  />
</app-page-wrapper>
