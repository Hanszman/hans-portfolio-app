<app-header [navigationItems]="navigationItems()" />

<section class="admin-page">
  <div class="admin-page-shell">
    <app-section-header
      [sectionLabel]="'pages.admin.placeholder.eyebrow' | translate"
      [title]="'pages.admin.placeholder.title' | translate"
      [description]="'pages.admin.placeholder.description' | translate"
    >
      <hans-button
        sectionHeaderActions
        class="admin-page-logout"
        [attr.aria-label]="'pages.admin.placeholder.actions.logout' | translate"
        [buttonColor]="'base'"
        [buttonSize]="'medium'"
        [buttonVariant]="'outline'"
        (click)="logout()"
      >
        {{ 'pages.admin.placeholder.actions.logout' | translate }}
      </hans-button>
    </app-section-header>

    <div class="admin-page-session">
      <h2>{{ 'pages.admin.placeholder.session' | translate }}</h2>
      <p>{{ adminIdentity() }}</p>
    </div>

    <div class="admin-page-next-step">
      <h2>{{ 'pages.admin.placeholder.nextStep' | translate }}</h2>
      <p>{{ 'pages.admin.placeholder.nextStepDescription' | translate }}</p>
    </div>
  </div>
</section>

<app-footer />
