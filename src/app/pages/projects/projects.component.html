<app-page-wrapper>
  <div page-main>
    <app-page-intro
      [sectionLabel]="'pages.projects.sectionLabel' | translate"
      [title]="'pages.projects.title' | translate"
      [description]="'pages.projects.description' | translate"
    />
  </div>

  <app-surface
    page-sidebar
    tone="warning"
    [label]="'pages.projects.roadmap.label' | translate"
    [surfaceTitle]="'pages.projects.roadmap.title' | translate"
    [description]="'pages.projects.roadmap.description' | translate"
  />

  <app-surface
    page-content
    tone="success"
    [label]="'pages.projects.status.label' | translate"
    [surfaceTitle]="'pages.projects.status.title' | translate"
    [description]="'pages.projects.status.description' | translate"
  />

  <app-surface
    page-content
    tone="base"
    [label]="'pages.projects.layout.label' | translate"
    [surfaceTitle]="'pages.projects.layout.title' | translate"
    [description]="'pages.projects.layout.description' | translate"
  />
</app-page-wrapper>
