<app-page-wrapper>
  <div page-main>
    <app-page-intro
      [sectionLabel]="i18n.t('pages.projects.sectionLabel')"
      [title]="i18n.t('pages.projects.title')"
      [description]="i18n.t('pages.projects.description')"
    />
  </div>

  <app-surface
    page-sidebar
    tone="warning"
    [label]="i18n.t('pages.projects.roadmap.label')"
    [surfaceTitle]="i18n.t('pages.projects.roadmap.title')"
    [description]="i18n.t('pages.projects.roadmap.description')"
  />

  <app-surface
    page-content
    tone="success"
    [label]="i18n.t('pages.projects.status.label')"
    [surfaceTitle]="i18n.t('pages.projects.status.title')"
    [description]="i18n.t('pages.projects.status.description')"
  />

  <app-surface
    page-content
    tone="base"
    [label]="i18n.t('pages.projects.layout.label')"
    [surfaceTitle]="i18n.t('pages.projects.layout.title')"
    [description]="i18n.t('pages.projects.layout.description')"
  />
</app-page-wrapper>
