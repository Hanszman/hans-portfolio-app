<article
  class="project-case-card-trigger"
  role="button"
  tabindex="0"
  [attr.aria-label]="'common.actions.viewDetails' | translate"
  (click)="requestDetails()"
  (keydown)="requestDetailsFromKeyboard($event)"
>
  <hans-card
    class="project-case-card"
    [cardLayout]="'custom'"
    [cardSize]="'large'"
    [cardVariant]="'outline'"
    [cardBackgroundColor]="'var(--card-background-color)'"
    [cardBorderColor]="'var(--card-border-color)'"
    [cardMutedColor]="'var(--card-muted-color)'"
    [cardTextColor]="'var(--text-color)'"
  >
    <div class="project-case-card-content">
      <header class="project-case-card-header">
        <h2>{{ project().title }}</h2>

        <span class="project-case-card-open" aria-hidden="true">
          <hans-icon name="LuExternalLink" iconSize="small"></hans-icon>
        </span>
      </header>

      <hans-tag
        [attr.label]="project().contextLabel"
        iconName="LuTag"
        tagColor="primary"
        tagSize="sm"
      ></hans-tag>

      <p>{{ project().summary }}</p>

      <span class="project-case-card-date">
        <hans-icon name="LuCalendar" iconSize="small"></hans-icon>
        {{ project().dateRangeLabel }}
      </span>

      <div class="project-case-card-stack">
        @for (technology of visibleTechnologies(); track technology.slug) {
          <app-tag-button
            [tag]="technology"
            (selected)="requestTechnologyDetails($event)"
          />
        }

        <app-expandable-list-toggle
          [isExpanded]="isTechnologyListExpanded()"
          [hiddenCount]="hiddenTechnologyCount()"
          expandLabelKey="common.actions.showMore"
          collapseLabelKey="common.actions.showLess"
          (toggled)="toggleTechnologyList()"
        />
      </div>
    </div>
  </hans-card>
</article>
