<app-surface-card class="dashboard-chart-panel">
  <span class="dashboard-chart-panel-eyebrow">
    {{ labelKey() | translate }}
  </span>
  <strong class="dashboard-chart-panel-title">{{ titleKey() | translate }}</strong>
  <p class="dashboard-chart-panel-description">
    {{ descriptionKey() | translate }}
  </p>

  @if (chart(); as chartModel) {
    <div
      class="dashboard-chart-scroll"
      [class.dashboard-chart-scrollable]="scrollable()"
    >
      <hans-chart
        class="dashboard-chart"
        [chartType]="chartModel.chartType"
        [categories]="chartModel.categories"
        [series]="chartModel.series"
        [colors]="chartModel.colors"
        [height]="chartModel.height"
        [showLegend]="chartModel.showLegend"
      ></hans-chart>
    </div>
  } @else {
    <app-info-state mode="empty" [message]="emptyMessageKey() | translate" />
  }
</app-surface-card>
