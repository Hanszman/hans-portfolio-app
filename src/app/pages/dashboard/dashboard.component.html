<app-page-wrapper>
  <div page-main>
    <app-page-intro
      [sectionLabel]="'pages.dashboard.sectionLabel' | translate"
      [title]="'pages.dashboard.title' | translate"
      [description]="'pages.dashboard.description' | translate"
    />
  </div>

  <app-container
    page-sidebar
    tone="danger"
    [label]="'pages.dashboard.roadmap.label' | translate"
    [containerTitle]="'pages.dashboard.roadmap.title' | translate"
    [description]="'pages.dashboard.roadmap.description' | translate"
  />

  <app-container
    page-content
    tone="success"
    [label]="'pages.dashboard.status.label' | translate"
    [containerTitle]="'pages.dashboard.status.title' | translate"
    [description]="'pages.dashboard.status.description' | translate"
  />

  <app-container
    page-content
    tone="base"
    [label]="'pages.dashboard.layout.label' | translate"
    [containerTitle]="'pages.dashboard.layout.title' | translate"
    [description]="'pages.dashboard.layout.description' | translate"
  />
</app-page-wrapper>
