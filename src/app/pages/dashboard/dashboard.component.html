<app-page-wrapper>
  <div page-main>
    <app-page-intro
      [sectionLabel]="i18n.t('pages.dashboard.sectionLabel')"
      [title]="i18n.t('pages.dashboard.title')"
      [description]="i18n.t('pages.dashboard.description')"
    />
  </div>

  <app-surface
    page-sidebar
    tone="danger"
    [label]="i18n.t('pages.dashboard.roadmap.label')"
    [surfaceTitle]="i18n.t('pages.dashboard.roadmap.title')"
    [description]="i18n.t('pages.dashboard.roadmap.description')"
  />

  <app-surface
    page-content
    tone="success"
    [label]="i18n.t('pages.dashboard.status.label')"
    [surfaceTitle]="i18n.t('pages.dashboard.status.title')"
    [description]="i18n.t('pages.dashboard.status.description')"
  />

  <app-surface
    page-content
    tone="base"
    [label]="i18n.t('pages.dashboard.layout.label')"
    [surfaceTitle]="i18n.t('pages.dashboard.layout.title')"
    [description]="i18n.t('pages.dashboard.layout.description')"
  />
</app-page-wrapper>
