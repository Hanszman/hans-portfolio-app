<app-wrapper>
  <app-dashboard-hero
    page-main
    [sectionLabelKey]="'pages.dashboard.sectionLabel'"
    [titleKey]="'pages.dashboard.title'"
    [descriptionKey]="'pages.dashboard.description'"
  />

  <div page-content class="dashboard-page-content">
    @if (isLoading()) {
      <section class="dashboard-state-shell">
        <app-info-state
          mode="loading"
          [message]="'pages.dashboard.snapshot.loading' | translate"
        />
      </section>
    } @else if (hasError()) {
      <section class="dashboard-state-shell">
        <app-info-state
          mode="error"
          [message]="'pages.dashboard.snapshot.error' | translate"
        />
      </section>
    } @else {
      <app-dashboard-summary-strip [cards]="summaryCards()" />

      <app-dashboard-analytics-grid
        [stackChart]="stackChart()"
        [technologyLevelChart]="technologyLevelChart()"
        [projectEnvironmentChart]="projectEnvironmentChart()"
        [technologyUsageChart]="technologyUsageChart()"
      />

      <app-dashboard-project-technology-panel
        [labelKey]="'pages.dashboard.projectsByType.label'"
        [titleKey]="'pages.dashboard.projectsByType.title'"
        [descriptionKey]="'pages.dashboard.projectsByType.description'"
        [selectLabelKey]="'pages.dashboard.projectsByType.selectLabel'"
        [emptyMessageKey]="'pages.dashboard.projectsByType.empty'"
        [options]="technologyTypeOptions()"
        [selectedTechnologyType]="selectedTechnologyType()"
        [chart]="projectTechnologyChart()"
        (technologyTypeChange)="selectTechnologyType($event)"
      />
    }
  </div>
</app-wrapper>
