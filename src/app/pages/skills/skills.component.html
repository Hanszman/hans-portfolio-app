<app-page-wrapper>
  <div page-main>
    <app-page-intro
      [sectionLabel]="'pages.skills.sectionLabel' | translate"
      [title]="'pages.skills.title' | translate"
      [description]="'pages.skills.description' | translate"
    />
  </div>

  <app-surface
    page-sidebar
    tone="info"
    [label]="'pages.skills.roadmap.label' | translate"
    [surfaceTitle]="'pages.skills.roadmap.title' | translate"
    [description]="'pages.skills.roadmap.description' | translate"
  />

  <app-surface
    page-content
    tone="success"
    [label]="'pages.skills.status.label' | translate"
    [surfaceTitle]="'pages.skills.status.title' | translate"
    [description]="'pages.skills.status.description' | translate"
  />

  <app-surface
    page-content
    tone="base"
    [label]="'pages.skills.layout.label' | translate"
    [surfaceTitle]="'pages.skills.layout.title' | translate"
    [description]="'pages.skills.layout.description' | translate"
  />
</app-page-wrapper>
