<app-page-wrapper>
  <div page-main>
    <app-page-intro
      [sectionLabel]="i18n.t('pages.skills.sectionLabel')"
      [title]="i18n.t('pages.skills.title')"
      [description]="i18n.t('pages.skills.description')"
    />
  </div>

  <app-surface
    page-sidebar
    tone="info"
    [label]="i18n.t('pages.skills.roadmap.label')"
    [surfaceTitle]="i18n.t('pages.skills.roadmap.title')"
    [description]="i18n.t('pages.skills.roadmap.description')"
  />

  <app-surface
    page-content
    tone="success"
    [label]="i18n.t('pages.skills.status.label')"
    [surfaceTitle]="i18n.t('pages.skills.status.title')"
    [description]="i18n.t('pages.skills.status.description')"
  />

  <app-surface
    page-content
    tone="base"
    [label]="i18n.t('pages.skills.layout.label')"
    [surfaceTitle]="i18n.t('pages.skills.layout.title')"
    [description]="i18n.t('pages.skills.layout.description')"
  />
</app-page-wrapper>
