<button
  type="button"
  class="skill-card-button"
  [attr.data-kind]="item().kind"
  (click)="requestDetails()"
>
  <hans-card
    class="skill-card"
    [cardLayout]="'custom'"
    [cardSize]="'large'"
    [cardBackgroundColor]="'var(--card-background-color)'"
    [cardBorderColor]="'var(--card-border-color)'"
    [cardMutedColor]="'var(--card-muted-color)'"
    [cardTextColor]="'var(--text-color)'"
  >
    <article class="skill-card-content">
      <header class="skill-card-header">
        @if (item().visualUrl) {
          <img
            class="skill-card-image"
            [src]="item().visualUrl"
            [alt]="item().name"
            loading="lazy"
          />
        } @else {
          <span class="skill-card-icon">
            <hans-icon [name]="item().iconName" iconSize="small"></hans-icon>
          </span>
        }

        <h3>{{ item().name }}</h3>

        @if (item().badgeLabel) {
          <hans-tag
            [attr.label]="item().badgeLabel"
            tagColor="base"
            tagSize="sm"
          ></hans-tag>
        }
      </header>

      @if (item().subtitle) {
        <p class="skill-card-subtitle">{{ item().subtitle }}</p>
      }

      @if (item().totalExperienceLabel) {
        <span class="skill-card-meta">{{ item().totalExperienceLabel }}</span>
      }

      @if (item().kind === 'technology') {
        <span class="skill-card-category">{{ item().categoryLabel }}</span>
      }
    </article>
  </hans-card>
</button>
