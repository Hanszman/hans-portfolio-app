<button type="button" class="tag-button" (click)="requestSelection($event)">
  <hans-tag
    [attr.label]="tag().label"
    [attr.image-src]="tag().image?.src ?? null"
    [attr.image-alt]="tag().image?.alt ?? null"
    [attr.mediaPosition]="'left'"
    [attr.tagColor]="tagColor()"
    [attr.tagSize]="'sm'"
  ></hans-tag>
</button>
