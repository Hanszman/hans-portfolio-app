<hans-modal
  [isOpen]="isOpen()"
  [title]="titleKey() | translate"
  [cancelButtonColor]="'primary'"
  [cancelDisabled]="isSubmitting()"
  [cancelLabel]="'common.actions.close' | translate"
  [closeOnConfirm]="false"
  [confirmButtonColor]="'primary'"
  [confirmDisabled]="isInteractionDisabled()"
  [confirmLabel]="showSubmit() ? (submitLabelKey() | translate) : ''"
  [confirmLoading]="isSubmitting()"
  [dismissible]="!isSubmitting()"
  [paginationAriaLabel]="'common.pagination.navigation' | translate"
  [paginationCurrentPage]="showPagination() ? pagination().page : 0"
  [paginationDisabled]="isInteractionDisabled()"
  [paginationFirstLabel]="'common.pagination.first' | translate"
  [paginationFirstContent]="'MdKeyboardDoubleArrowLeft'"
  [paginationLastLabel]="'common.pagination.last' | translate"
  [paginationLastContent]="'MdKeyboardDoubleArrowRight'"
  [paginationNextLabel]="'common.pagination.next' | translate"
  [paginationNextContent]="'MdKeyboardArrowRight'"
  [paginationPageLabel]="'common.pagination.pageLabel' | translate"
  [paginationPreviousLabel]="'common.pagination.previous' | translate"
  [paginationPreviousContent]="'MdKeyboardArrowLeft'"
  [paginationTotalPages]="showPagination() ? pagination().totalPages : 0"
  modalSize="large"
  placement="center"
  [renderBody]="true"
  [closeButtonLabel]="'common.actions.close' | translate"
  (close)="requestClose()"
  (cancel)="requestClose()"
  (confirm)="submit()"
  (pagechange)="selectPage($event)"
  (pageChange)="selectPage($event)"
>
  <div class="operations-modal">
    <div class="operations-modal-scroll">
      @if (descriptionKey(); as descriptionKey) {
        <p class="operations-modal-description">
          {{ descriptionKey | translate }}
        </p>
      }

      @if (showSearch()) {
        <div class="operations-modal-search">
          <hans-input
            [label]="'common.search.label' | translate"
            inputColor="base"
            inputSize="medium"
            [value]="searchValue()"
            [placeholder]="'common.search.placeholder' | translate"
            [attr.aria-label]="'common.search.label' | translate"
            (input)="emitSearchChange($any($event).target?.value ?? '')"
          ></hans-input>
        </div>
      }

      <div class="operations-modal-body">
        <ng-content />
      </div>
    </div>
  </div>
</hans-modal>
