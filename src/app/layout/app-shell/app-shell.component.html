<main class="app-shell" data-testid="app-shell">
  <app-portfolio-header [navigationItems]="navigationItems()" />

  <div class="app-shell-api-status-wrapper">
    <app-portfolio-surface [tone]="apiStatusTone()" spacing="compact">
      <section class="app-shell-api-status" data-testid="app-shell-api-status">
        <div class="app-shell-api-status-copy">
          <span class="app-shell-api-status-eyebrow">API</span>
          <strong class="app-shell-api-status-title">{{ apiStatus().title }}</strong>
          <p class="app-shell-api-status-description">{{ apiStatus().description }}</p>
        </div>

        <code class="app-shell-api-status-base-url">{{ apiStatus().baseUrl }}</code>
      </section>
    </app-portfolio-surface>
  </div>

  <section class="app-shell-stage">
    <div class="app-shell-content">
      <router-outlet />
    </div>
  </section>

  <app-portfolio-footer [navigationItems]="navigationItems()" />
</main>
