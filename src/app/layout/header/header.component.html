<header class="header" data-testid="header">
  <div class="header-shell">
    <div class="header-content">
      <a class="header-brand" routerLink="/home" [attr.aria-label]="'header.brand.home' | translate">
        <img
          class="header-brand-image"
          src="assets/img/logo/vh_logo_blue.png"
          alt="Victor Hanszman logo"
        />
      </a>

      <app-navigation
        class="header-navigation"
        [items]="navigationItems()"
        [menuOpen]="isMobileMenuOpen()"
        (itemSelected)="closeMobileMenu()"
      />

      <div class="header-actions">
        <div class="header-theme-control">
          <span class="header-control-label">
            {{ 'header.controls.darkMode' | translate }}
          </span>
          <hans-toggle
            #themeToggle
            [attr.aria-label]="'header.controls.theme' | translate"
            [checked]="theme.mode() === 'dark'"
            (change)="setThemeMode($event)"
            toggleColor="primary"
            toggleSize="small"
          ></hans-toggle>
        </div>

        <app-header-language-dropdown />

        <hans-button
          class="header-menu-button"
          [attr.aria-label]="'header.controls.navigation' | translate"
          buttonColor="primary"
          buttonShape="rounded"
          buttonSize="small"
          buttonVariant="default"
          (click)="toggleMobileMenu()"
        >
          <hans-icon
            [name]="isMobileMenuOpen() ? 'FaTimes' : 'FaBars'"
            iconSize="small"
          ></hans-icon>
        </hans-button>
      </div>
    </div>
  </div>
</header>
