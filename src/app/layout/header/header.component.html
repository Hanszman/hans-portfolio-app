<header class="header" data-testid="header">
  <app-surface>
    <div class="header-content">
      <div class="header-top">
        <a class="header-brand" routerLink="/home">
          <span class="header-brand-mark">VH</span>
          <span class="header-brand-copy">
            <strong>Victor Hanszman</strong>
            <span>{{ i18n.t('header.brand.role') }}</span>
          </span>
        </a>

        <div class="header-actions">
          <div class="header-tags" [attr.aria-label]="i18n.t('header.statusLabel')">
            <hans-tag
              [attr.label]="i18n.t('header.tags.angular')"
              tagColor="warning"
              tagSize="md"
            ></hans-tag>
            <hans-tag
              [attr.label]="i18n.t('header.tags.signals')"
              tagColor="info"
              tagSize="md"
            ></hans-tag>
            <hans-tag
              [attr.label]="i18n.t('header.tags.api')"
              tagColor="success"
              tagSize="md"
            ></hans-tag>
          </div>

          <div class="header-controls">
            <hans-button
              [attr.label]="
                i18n.t(
                  theme.mode() === 'light'
                    ? 'header.controls.darkTheme'
                    : 'header.controls.lightTheme'
                )
              "
              buttonColor="base"
              buttonShape="rounded"
              buttonSize="small"
              buttonVariant="outline"
              (click)="theme.toggleMode()"
            ></hans-button>

            <hans-button
              [attr.label]="
                i18n.t(
                  i18n.locale() === 'en'
                    ? 'header.controls.portuguese'
                    : 'header.controls.english'
                )
              "
              buttonColor="secondary"
              buttonShape="rounded"
              buttonSize="small"
              buttonVariant="outline"
              (click)="i18n.toggleLocale()"
            ></hans-button>
          </div>
        </div>
      </div>

      <div class="header-hero">
        <div class="header-copy">
          <span class="header-eyebrow">{{ i18n.t('header.eyebrow') }}</span>
          <h1 class="header-title">
            {{ i18n.t('header.title') }}
          </h1>
          <p class="header-description">
            {{ i18n.t('header.description') }}
          </p>
        </div>

        <div class="header-highlights">
          <app-surface
            tone="primary"
            spacing="compact"
            [label]="i18n.t('header.highlight.layout.label')"
            [surfaceTitle]="i18n.t('header.highlight.layout.title')"
            [description]="i18n.t('header.highlight.layout.description')"
          />

          <app-surface
            tone="success"
            spacing="compact"
            [label]="i18n.t('header.highlight.integration.label')"
            [surfaceTitle]="i18n.t('header.highlight.integration.title')"
            [description]="i18n.t('header.highlight.integration.description')"
          />

          <app-surface
            tone="info"
            spacing="compact"
            [label]="i18n.t('header.highlight.direction.label')"
            [surfaceTitle]="i18n.t('header.highlight.direction.title')"
            [description]="i18n.t('header.highlight.direction.description')"
          />
        </div>
      </div>

      <app-navigation [items]="navigationItems()" />
    </div>
  </app-surface>
</header>
