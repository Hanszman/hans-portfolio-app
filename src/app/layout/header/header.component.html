<header class="header" data-testid="header">
  <div class="header-shell">
    <div class="header-content">
      <a
        class="header-brand"
        routerLink="/home"
        [attr.aria-label]="'header.brand.home' | translate"
      >
        <img
          class="header-brand-image header-brand-image-default"
          [src]="brandLogoBluePath"
          alt="Victor Hanszman logo"
        />
        <img
          class="header-brand-image header-brand-image-hover"
          [src]="brandLogoWhitePath"
          alt=""
          aria-hidden="true"
        />
      </a>

      <app-navigation class="header-navigation" [items]="navigationItems()" />

      <div class="header-actions">
        <div class="header-theme-control">
          <hans-icon
            class="header-theme-icon"
            [name]="themeIconName"
            [iconSize]="'medium'"
            [attr.aria-label]="
              theme.mode() === 'dark'
                ? ('header.controls.lightTheme' | translate)
                : ('header.controls.darkTheme' | translate)
            "
          ></hans-icon>
          <hans-toggle
            #themeToggle
            [attr.aria-label]="'header.controls.theme' | translate"
            [checked]="theme.mode() === 'dark'"
            (change)="setThemeMode($event)"
            [toggleColor]="'primary'"
            [toggleSize]="'small'"
          ></hans-toggle>
        </div>

        <app-header-language-dropdown />

        <hans-dropdown
          #mobileMenuDropdown
          class="header-menu-dropdown"
          [triggerLabel]="''"
          [triggerAriaLabel]="'header.controls.navigation' | translate"
          [options]="mobileMenuOptions()"
          [popupBackgroundColor]="'var(--white)'"
          [optionTextColor]="'var(--app-shell-surface-color)'"
          [optionHoverBackgroundColor]="'var(--primary-default-color)'"
          [optionHoverTextColor]="'var(--white)'"
          [emptyTextColor]="'var(--app-shell-surface-color)'"
          [triggerColor]="'primary'"
          [triggerHoverColor]="'primary'"
          [triggerHoverVariant]="'inverse'"
          [triggerIconName]="'FaBars'"
          [triggerShape]="'square'"
          [triggerSize]="'large'"
          [triggerVariant]="'default'"
          [showTriggerCaret]="false"
          (select)="selectMobileNavigation($event)"
        ></hans-dropdown>
      </div>
    </div>
  </div>
</header>
