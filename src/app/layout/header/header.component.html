<header class="header" data-testid="header">
  <app-surface>
    <div class="header-content">
      <div class="header-top">
        <a class="header-brand" routerLink="/home">
          <span class="header-brand-mark">VH</span>
          <span class="header-brand-copy">
            <strong>Victor Hanszman</strong>
            <span>{{ 'header.brand.role' | translate }}</span>
          </span>
        </a>

        <div class="header-actions">
          <div class="header-tags" [attr.aria-label]="'header.statusLabel' | translate">
            <hans-tag
              [attr.label]="'header.tags.angular' | translate"
              tagColor="warning"
              tagSize="md"
            ></hans-tag>
            <hans-tag
              [attr.label]="'header.tags.signals' | translate"
              tagColor="info"
              tagSize="md"
            ></hans-tag>
            <hans-tag
              [attr.label]="'header.tags.api' | translate"
              tagColor="success"
              tagSize="md"
            ></hans-tag>
          </div>

          <div class="header-controls">
            <hans-toggle
              #themeToggle
              [checked]="theme.mode() === 'dark'"
              [label]="'header.controls.theme' | translate"
              [leftLabel]="'header.controls.lightTheme' | translate"
              [rightLabel]="'header.controls.darkTheme' | translate"
              toggleColor="primary"
              toggleSize="small"
            ></hans-toggle>

            <hans-dropdown
              #languageDropdown
              [noOptionsText]="'header.controls.noLanguages' | translate"
              [options]="languageOptions()"
              [triggerLabel]="'header.controls.language' | translate"
              triggerColor="secondary"
              triggerShape="rounded"
              triggerSize="small"
              triggerVariant="outline"
            ></hans-dropdown>
          </div>
        </div>
      </div>

      <div class="header-hero">
        <div class="header-copy">
          <span class="header-eyebrow">{{ 'header.eyebrow' | translate }}</span>
          <h1 class="header-title">
            {{ 'header.title' | translate }}
          </h1>
          <p class="header-description">
            {{ 'header.description' | translate }}
          </p>
        </div>

        <div class="header-highlights">
          <app-surface
            tone="primary"
            spacing="compact"
            [label]="'header.highlight.layout.label' | translate"
            [surfaceTitle]="'header.highlight.layout.title' | translate"
            [description]="'header.highlight.layout.description' | translate"
          />

          <app-surface
            tone="success"
            spacing="compact"
            [label]="'header.highlight.integration.label' | translate"
            [surfaceTitle]="'header.highlight.integration.title' | translate"
            [description]="'header.highlight.integration.description' | translate"
          />

          <app-surface
            tone="info"
            spacing="compact"
            [label]="'header.highlight.direction.label' | translate"
            [surfaceTitle]="'header.highlight.direction.title' | translate"
            [description]="'header.highlight.direction.description' | translate"
          />
        </div>
      </div>

      <app-navigation [items]="navigationItems()" />
    </div>
  </app-surface>
</header>
