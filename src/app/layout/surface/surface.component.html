<section [class]="surfaceClassName()" data-testid="surface">
  @if (hasHeader()) {
    <header class="surface-header">
      @if (label()) {
        <span class="surface-label">{{ label() }}</span>
      }

      @if (surfaceTitle()) {
        <strong class="surface-title">{{ surfaceTitle() }}</strong>
      }

      @if (description()) {
        <p class="surface-description">{{ description() }}</p>
      }
    </header>
  }

  <ng-content />
</section>
