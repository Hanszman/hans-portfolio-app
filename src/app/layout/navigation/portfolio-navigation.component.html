<nav
  class="portfolio-navigation"
  aria-label="Primary portfolio navigation"
  data-testid="portfolio-navigation"
>
  @for (item of items(); track item.path) {
    <hans-button
      #activeRoute="routerLinkActive"
      class="portfolio-navigation-button"
      [routerLink]="item.path"
      routerLinkActive="portfolio-navigation-button-active"
      [routerLinkActiveOptions]="{ exact: true }"
      [attr.label]="item.label"
      [attr.buttonVariant]="activeRoute.isActive ? 'default' : 'outline'"
      buttonColor="primary"
      buttonShape="rounded"
      buttonSize="medium"
    ></hans-button>
  }
</nav>
