<nav
  class="navigation"
  [class.navigation-open]="menuOpen()"
  [class.navigation-popup-mode]="popupMode()"
  aria-label="Primary portfolio navigation"
  data-testid="navigation"
  style="--text-color: var(--app-shell-foreground-color)"
>
  @for (item of items(); track item.path) {
    <hans-button
      #activeRoute="routerLinkActive"
      class="navigation-button"
      [routerLink]="item.path"
      routerLinkActive="navigation-button-active"
      [routerLinkActiveOptions]="{ exact: true }"
      [label]="item.label"
      [buttonColor]="activeRoute.isActive ? 'primary' : 'base'"
      [hoverButtonColor]="'primary'"
      [hoverButtonVariant]="'transparent'"
      [buttonShape]="'rounded'"
      [buttonSize]="'small'"
      [buttonVariant]="'transparent'"
      (click)="itemSelected.emit()"
    ></hans-button>
  }
</nav>
