<footer class="footer" data-testid="footer">
  <div class="footer-shell">
    <div class="footer-content">
      <app-social-links
        class="footer-social-panel"
        [ariaLabelKey]="'footer.social.navigation'"
        [links]="socialLinks"
      />

      <div class="footer-meta">
        <app-footer-copyright />
        <app-location [labelKey]="locationKey" />
      </div>
    </div>
  </div>
</footer>
