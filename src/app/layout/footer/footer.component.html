<footer class="footer" data-testid="footer">
  <app-surface>
    <div class="footer-content">
      <div class="footer-copy">
        <span class="footer-eyebrow">{{ i18n.t('footer.eyebrow') }}</span>
        <strong class="footer-title">{{ i18n.t('footer.title') }}</strong>
        <p class="footer-description">
          {{ i18n.t('footer.description') }}
        </p>
      </div>

      <nav class="footer-links" [attr.aria-label]="i18n.t('footer.navigationLabel')">
        @for (item of navigationItems(); track item.path) {
          <hans-button
            [routerLink]="item.path"
            [attr.label]="item.label"
            buttonColor="base"
            buttonShape="rounded"
            buttonSize="small"
            buttonVariant="outline"
          ></hans-button>
        }
      </nav>

      <div class="footer-tags" [attr.aria-label]="i18n.t('footer.principlesLabel')">
        <hans-tag
          [attr.label]="i18n.t('footer.tags.standalone')"
          tagColor="warning"
          tagSize="sm"
        ></hans-tag>
        <hans-tag
          [attr.label]="i18n.t('footer.tags.tailwind')"
          tagColor="info"
          tagSize="sm"
        ></hans-tag>
        <hans-tag
          [attr.label]="i18n.t('footer.tags.coverage')"
          tagColor="success"
          tagSize="sm"
        ></hans-tag>
      </div>
    </div>
  </app-surface>
</footer>
