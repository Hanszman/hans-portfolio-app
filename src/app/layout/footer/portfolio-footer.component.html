<footer class="portfolio-footer" data-testid="portfolio-footer">
  <div class="portfolio-footer-surface">
    <div class="portfolio-footer-copy">
      <span class="portfolio-footer-eyebrow">Portfolio shell</span>
      <strong class="portfolio-footer-title">Layout foundation ready for the next page builds</strong>
      <p class="portfolio-footer-description">
        The portfolio-specific shell now separates layout from pages, keeps navigation
        centralized from the route config, and stays aligned with the design library.
      </p>
    </div>

    <nav class="portfolio-footer-links" aria-label="Footer navigation">
      @for (item of navigationItems(); track item.path) {
        <a class="portfolio-footer-link" [routerLink]="item.path">
          {{ item.label }}
        </a>
      }
    </nav>

    <div class="portfolio-footer-tags" aria-label="Implementation principles">
      <hans-tag label="Standalone only" tagColor="warning" tagSize="sm"></hans-tag>
      <hans-tag label="Tailwind @apply" tagColor="info" tagSize="sm"></hans-tag>
      <hans-tag label="100% coverage" tagColor="success" tagSize="sm"></hans-tag>
    </div>
  </div>
</footer>
